<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToxiGram – {% block title %}Feed{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    /* === EMBEDDED FALLBACK — always loads even if static folder has issues === */
    :root{--bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--border:#2a2a2a;--text:#f0f0f0;--text2:#a0a0a0;--text3:#606060;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--yellow:#eab308;--orange:#f97316;--red:#ef4444;--darkred:#7f1d1d;--radius:14px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,0.5)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
    a{color:var(--accent2);text-decoration:none}
    a:hover{text-decoration:underline}
    .navbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .nav-inner{max-width:1000px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:16px}
    .nav-logo{display:flex;align-items:center;gap:8px;font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--text);text-decoration:none}
    .nav-links{margin-left:auto;display:flex;align-items:center;gap:4px}
    .nav-btn{display:flex;align-items:center;justify-content:center;width:40px;height:40px;color:var(--text2);border-radius:var(--radius-sm);transition:all .2s}
    .nav-btn svg{width:22px;height:22px}
    .nav-btn:hover{background:var(--bg3);color:var(--text);text-decoration:none}
    .avatar-xs{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0}
    .avatar-md{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:#fff;flex-shrink:0}
    .avatar-lg{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:#fff;flex-shrink:0}
    .avatar-xl{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:#fff}
    .flash-container{max-width:600px;margin:16px auto;padding:0 20px}
    .flash{padding:12px 16px;border-radius:var(--radius-sm);font-size:.9rem;margin-bottom:8px}
    .flash-error{background:#2d1a1a;border:1px solid var(--red);color:#fca5a5}
    .flash-success{background:#1a2d1a;border:1px solid var(--green);color:#86efac}
    .main-content{padding:24px 20px 60px}
    .feed-layout{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:1fr 280px;gap:24px;align-items:start}
    @media(max-width:768px){.feed-layout{grid-template-columns:1fr}.sidebar-column{display:none}}
    .feed-column{display:flex;flex-direction:column;gap:20px}
    .post-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .2s}
    .post-card:hover{box-shadow:var(--shadow)}
    .post-header{display:flex;align-items:center;gap:12px;padding:14px 16px}
    .post-author{display:flex;align-items:center;gap:10px;color:var(--text);text-decoration:none}
    .author-name{font-weight:600;font-size:.95rem}
    .post-time{font-size:.75rem;color:var(--text3)}
    .post-image-wrap{background:var(--bg3)}
    .post-image{width:100%;max-height:520px;object-fit:cover;display:block}
    .post-caption{padding:12px 16px;font-size:.95rem;color:var(--text);line-height:1.5}
    .post-actions{display:flex;align-items:center;gap:12px;padding:8px 16px 10px}
    .like-btn,.comment-toggle-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:.9rem;display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:var(--radius-sm);transition:all .2s}
    .like-btn:hover{background:rgba(239,68,68,0.1);color:var(--red)}
    .like-btn.liked{color:var(--red)}
    .comment-toggle-btn:hover{background:var(--bg3);color:var(--text)}
    .heart-icon{font-size:1.1rem;transition:transform .2s}
    .sentiment-badge{font-size:.78rem;color:var(--text3);background:var(--bg3);padding:4px 10px;border-radius:20px;white-space:nowrap}
    .sentiment-bars{padding:8px 16px 12px;display:flex;flex-direction:column;gap:4px;border-top:1px solid var(--border)}
    .sbar-row{display:flex;align-items:center;gap:8px}
    .sbar-label{font-size:.85rem;width:20px}
    .sbar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
    .sbar-fill{height:100%;border-radius:3px;transition:width .5s ease}
    .sbar-pos{background:var(--green)}
    .sbar-neu{background:var(--text3)}
    .sbar-neg{background:var(--red)}
    .sbar-pct{font-size:.72rem;color:var(--text3);width:30px;text-align:right}
    .comments-section{border-top:1px solid var(--border);padding:12px 16px 0}
    .comment-item{padding:10px 0;border-bottom:1px solid var(--border)}
    .comment-item:last-child{border-bottom:none}
    .comment-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .comment-author{display:flex;align-items:center;gap:6px;color:var(--text);text-decoration:none;font-size:.85rem;font-weight:600}
    .comment-time{font-size:.72rem;color:var(--text3);margin-left:auto}
    .tox-badge-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .tox-badge{font-size:.72rem;font-weight:600;padding:2px 9px;border-radius:20px}
    .tox-clean{background:rgba(34,197,94,.15);color:var(--green)}
    .tox-mild{background:rgba(234,179,8,.15);color:var(--yellow)}
    .tox-moderate{background:rgba(249,115,22,.15);color:var(--orange)}
    .tox-toxic{background:rgba(239,68,68,.15);color:var(--red)}
    .tox-extreme{background:rgba(127,29,29,.4);color:#fca5a5}
    .sentiment-text{font-size:.72rem;color:var(--text3)}
    .tox-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:7px}
    .tox-bar-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
    .tox-bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
    .tox-pct{font-size:.7rem;color:var(--text3);width:30px}
    .comment-text{font-size:.9rem;color:var(--text);line-height:1.5}
    .modified-notice{margin-top:6px;padding:6px 10px;background:rgba(99,102,241,.1);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;font-size:.78rem;color:var(--accent2)}
    .replacements-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
    .replacement-chip{background:var(--bg3);border:1px solid var(--border);padding:2px 8px;border-radius:20px;font-size:.72rem}
    .replacement-chip s{color:var(--red)}
    .replacement-chip strong{color:var(--green)}
    .comment-form{padding:12px 0}
    .comment-input-wrap{display:flex;align-items:flex-start;gap:10px}
    .comment-input-area{flex:1}
    .comment-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:8px 14px;color:var(--text);font-family:inherit;font-size:.88rem;resize:none;outline:none;transition:border-color .2s;min-height:36px;max-height:120px}
    .comment-input:focus{border-color:var(--accent)}
    .live-tox-meter{margin-top:6px;display:flex;align-items:center;gap:8px}
    .live-tox-bar-track{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
    .live-tox-bar-fill{height:100%;border-radius:2px;transition:width .3s ease,background .3s ease}
    .live-tox-label{font-size:.72rem;color:var(--text3);white-space:nowrap}
    .comment-form-footer{display:flex;justify-content:flex-end;margin-top:8px}
    .btn-comment{background:var(--accent);color:#fff;border:none;border-radius:20px;padding:6px 18px;font-size:.85rem;cursor:pointer;font-weight:600;transition:opacity .2s}
    .btn-comment:hover{opacity:.85}
    .sidebar-column{display:flex;flex-direction:column;gap:16px;position:sticky;top:72px}
    .sidebar-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
    .sidebar-user{display:flex;align-items:center;gap:12px}
    .sidebar-username{font-weight:600;font-size:.95rem}
    .sidebar-link{font-size:.8rem;color:var(--accent2)}
    .sidebar-title{font-size:.88rem;font-weight:700;margin-bottom:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
    .feature-list{list-style:none;display:flex;flex-direction:column;gap:6px;font-size:.85rem;color:var(--text2)}
    .scale-items{display:flex;flex-direction:column;gap:7px}
    .scale-item{display:flex;align-items:center;gap:8px;font-size:.83rem;color:var(--text2)}
    .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .dot-green{background:var(--green)}.dot-yellow{background:var(--yellow)}.dot-orange{background:var(--orange)}.dot-red{background:var(--red)}.dot-dark{background:#7f1d1d}
    .sidebar-analytics-link{display:block;cursor:pointer;transition:border-color .2s}
    .sidebar-analytics-link:hover{border-color:var(--accent);text-decoration:none}
    .sidebar-analytics-sub{font-size:.8rem;color:var(--text3)}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
    .empty-icon{font-size:3rem;margin-bottom:12px}
    .empty-state h3{font-size:1.2rem;margin-bottom:8px}
    .empty-state p{margin-bottom:20px}
    .centered-form-page{max-width:520px;margin:0 auto}
    .form-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
    .form-title{font-size:1.3rem;margin-bottom:22px}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-group label{font-size:.85rem;font-weight:600;color:var(--text2)}
    .form-input{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;color:var(--text);font-family:inherit;font-size:.95rem;outline:none;transition:border-color .2s}
    .form-input:focus{border-color:var(--accent)}
    .form-textarea{resize:vertical;min-height:80px}
    .auth-form{display:flex;flex-direction:column;gap:14px}
    .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px}
    .file-upload-area{background:var(--bg3);border:2px dashed var(--border);border-radius:var(--radius);padding:28px;text-align:center;cursor:pointer;position:relative;transition:border-color .2s}
    .file-upload-area:hover{border-color:var(--accent)}
    .file-input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .upload-icon{font-size:2.5rem;margin-bottom:8px}
    .upload-placeholder p{color:var(--text2);font-size:.9rem;margin-bottom:4px}
    .upload-placeholder small{color:var(--text3);font-size:.8rem}
    .image-preview{width:100%;border-radius:var(--radius-sm);max-height:300px;object-fit:cover}
    .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:11px 22px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s;text-decoration:none;display:inline-block}
    .btn-primary:hover{opacity:.85;text-decoration:none;color:#fff}
    .btn-full{width:100%;text-align:center}
    .btn-ghost{background:none;border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);padding:10px 18px;font-size:.9rem;font-family:inherit;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
    .btn-ghost:hover{background:var(--bg3);color:var(--text);text-decoration:none}
    .btn-sm{padding:4px 8px;font-size:.8rem}
    .profile-page{max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
    .profile-header-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;display:flex;align-items:center;gap:24px}
    .profile-username{font-size:1.4rem;font-weight:700;margin-bottom:4px}
    .profile-bio{color:var(--text2);font-size:.9rem;margin-bottom:14px}
    .profile-stats{display:flex;gap:28px}
    .stat-item{text-align:center}
    .stat-num{font-size:1.3rem;font-weight:700}
    .stat-lbl{font-size:.75rem;color:var(--text3)}
    .nlp-stats-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
    .nlp-stats-title{font-size:1rem;font-weight:700;margin-bottom:16px}
    .nlp-stats-grid{display:flex;gap:24px;margin-bottom:20px}
    .nlp-stat{text-align:center}
    .nlp-stat-num{font-size:2rem;font-weight:700}
    .nlp-stat-lbl{font-size:.78rem;color:var(--text3)}
    .color-green{color:var(--green)}.color-yellow{color:var(--yellow)}.color-orange{color:var(--orange)}.color-red{color:var(--red)}
    .profile-tox-bar{margin-top:10px}
    .profile-tox-label{font-size:.8rem;color:var(--text2);margin-bottom:6px}
    .tox-bar-ends{display:flex;justify-content:space-between;font-size:.72rem;color:var(--text3);margin-top:4px}
    .posts-grid-title{font-size:1rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
    .posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
    .grid-post{aspect-ratio:1/1;position:relative;overflow:hidden;background:var(--bg2);border-radius:4px;display:block}
    .grid-post-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
    .grid-post:hover .grid-post-img{transform:scale(1.05)}
    .grid-post-text-card{width:100%;height:100%;display:flex;align-items:center;padding:12px;background:var(--bg3)}
    .grid-post-text-card p{font-size:.8rem;color:var(--text2);line-height:1.4}
    .grid-post-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:.85rem;color:#fff;opacity:0;transition:opacity .2s}
    .grid-post:hover .grid-post-overlay{opacity:1}
    .analytics-page{max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
    .analytics-header{padding:8px 0 4px}
    .analytics-header h2{font-size:1.5rem;font-weight:700;margin-bottom:4px}
    .analytics-header p{color:var(--text3);font-size:.9rem}
    .analytics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    @media(max-width:600px){.analytics-grid{grid-template-columns:repeat(2,1fr)}}
    .analytics-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
    .analytics-card-red{border-color:rgba(239,68,68,.3)}.analytics-card-green{border-color:rgba(34,197,94,.3)}.analytics-card-blue{border-color:rgba(99,102,241,.3)}
    .analytics-icon{font-size:1.6rem;margin-bottom:8px}
    .analytics-num{font-size:2rem;font-weight:700;margin-bottom:4px}
    .analytics-lbl{font-size:.78rem;color:var(--text3)}
    .health-bar-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
    .health-bar-card h3{font-size:1rem;margin-bottom:14px}
    .health-bar-track{height:14px;background:var(--bg3);border-radius:7px;overflow:hidden;margin-bottom:8px}
    .health-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),#4ade80);border-radius:7px;transition:width .8s ease}
    .health-bar-labels{display:flex;justify-content:space-between;font-size:.78rem;color:var(--text3)}
    .legend-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
    .legend-card h3{font-size:1rem;margin-bottom:14px}
    .legend-bars{display:flex;flex-direction:column;gap:10px}
    .legend-row{display:flex;align-items:center;gap:12px}
    .legend-label{font-size:.82rem;color:var(--text2);width:130px;flex-shrink:0}
    .legend-bar{height:10px;border-radius:5px}
    .recent-events-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
    .recent-events-card h3{font-size:1rem;margin-bottom:14px}
    .events-table{width:100%;border-collapse:collapse;font-size:.88rem}
    .events-table th{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text3);font-weight:600;font-size:.78rem}
    .events-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
    .events-table tr:last-child td{border-bottom:none}
  </style>
</head>
<body>

<!-- ── NAV ── -->
{% if current_user.is_authenticated %}
<nav class="navbar">
  <div class="nav-inner">
    <a href="{{ url_for('index') }}" class="nav-logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">ToxiGram</span>
    </a>

    <div class="nav-links">
      <a href="{{ url_for('index') }}" class="nav-btn" title="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      </a>
      <a href="{{ url_for('create_post') }}" class="nav-btn" title="New Post">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </a>
      <a href="{{ url_for('analytics') }}" class="nav-btn" title="Analytics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </a>
      <a href="{{ url_for('profile', username=current_user.username) }}" class="nav-btn nav-avatar" title="Profile">
        <div class="avatar-xs">{{ current_user.username[0].upper() }}</div>
      </a>
      <a href="{{ url_for('logout') }}" class="nav-btn" title="Logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </a>
    </div>
  </div>
</nav>
{% endif %}

<!-- ── FLASH ── -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-container">
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<!-- ── MAIN ── -->
<main class="main-content">
  {% block content %}{% endblock %}
</main>

<script>
document.addEventListener("click",function(e){const btn=e.target.closest(".like-btn");if(!btn)return;const postId=btn.dataset.postId;const countEl=document.getElementById("like-count-"+postId);const heartEl=btn.querySelector(".heart-icon");fetch("/like/"+postId,{method:"POST"}).then(r=>r.json()).then(data=>{countEl.textContent=data.count;if(data.liked){btn.classList.add("liked");heartEl.textContent="❤️";heartEl.style.transform="scale(1.4)";setTimeout(()=>heartEl.style.transform="scale(1)",200)}else{btn.classList.remove("liked");heartEl.textContent="🤍"}})});
let debounceTimers={};
function liveAnalyze(textarea,postId){const text=textarea.value.trim();const meter=document.getElementById("live-meter-"+postId);const bar=document.getElementById("live-bar-"+postId);const label=document.getElementById("live-label-"+postId);if(!text){if(meter)meter.style.display="none";return}if(meter)meter.style.display="flex";clearTimeout(debounceTimers[postId]);debounceTimers[postId]=setTimeout(()=>{fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text})}).then(r=>r.json()).then(data=>{if(bar){bar.style.width=data.toxicity_percent+"%";bar.style.background=data.color}if(label){label.textContent=data.label+" · "+data.toxicity_percent+"%";label.style.color=data.color}})},350)}
document.addEventListener("input",function(e){if(e.target.classList.contains("comment-input")){e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px"}});
setTimeout(()=>{document.querySelectorAll(".flash").forEach(el=>{el.style.transition="opacity .4s";el.style.opacity="0";setTimeout(()=>el.remove(),400)})},3000);
window.addEventListener("DOMContentLoaded",()=>{document.querySelectorAll(".tox-bar-fill,.sbar-fill").forEach(bar=>{const target=bar.style.width;bar.style.width="0";requestAnimationFrame(()=>requestAnimationFrame(()=>bar.style.width=target))})});
</script>
</body>
</html>
